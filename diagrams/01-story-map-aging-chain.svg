<g><rect x="40" y="745" width="600" height="28" rx="8" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<text class="ts" x="56" y="763">Valves regulate maturation rate. B1 drains rework via better details. R1 reinforces aim alignment.</text></g>
