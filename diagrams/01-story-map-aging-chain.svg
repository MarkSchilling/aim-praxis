<svg width="100%" viewBox="0 0 680 780" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Story Map as an aging chain of intangible stocks</title>
<desc>Six stocks representing the maturation of information from raw ideas through refined stories to working software, with feedback loops via rework, lessons learned, and aim alignment.</desc>
