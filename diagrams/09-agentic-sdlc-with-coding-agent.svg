<svg width="100%" viewBox="0 0 680 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Agentic SDLC with coding agent placed in the TDD inner loop</title>
<desc>Five agents across the system: refinement, workshopping, glossary, coding, and PDSA. Two enforcement gates. Human judgment concentrated at aim, acceptance, and pattern interpretation.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="ts" x="40" y="28">Coral diamonds are agents. Purple stocks are information. Teal gates enforce quality.</text>

<g class="c-purple"><rect x="40" y="60" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="120" y="82" text-anchor="middle" dominant-baseline="central">Raw ideas</text>
<text class="ts" x="120" y="100" text-anchor="middle" dominant-baseline="central">Discovery, ideation</text></g>

<g class="c-purple"><rect x="260" y="60" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="82" text-anchor="middle" dominant-baseline="central">Backbone</text>
<text class="ts" x="340" y="100" text-anchor="middle" dominant-baseline="central">Unrefined tasks</text></g>

<g class="c-purple"><rect x="480" y="60" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="560" y="82" text-anchor="middle" dominant-baseline="central">Refined tasks</text>
<text class="ts" x="560" y="100" text-anchor="middle" dominant-baseline="central">Details, exceptions</text></g>

<line x1="200" y1="88" x2="256" y2="88" class="arr" marker-end="url(#arrow)"/>
<circle cx="228" cy="88" r="5" fill="var(--color-background-primary)" stroke="var(--t)" stroke-width="1"/>

<line x1="420" y1="88" x2="476" y2="88" class="arr" marker-end="url(#arrow)"/>
<g class="c-coral"><polygon points="448,76 460,88 448,100 436,88" stroke-width="0.5"/></g>
<text class="ts" x="448" y="58" text-anchor="middle">Refinement agent</text>

<g class="c-purple"><rect x="480" y="170" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="560" y="192" text-anchor="middle" dominant-baseline="central">Acceptance-ready</text>
<text class="ts" x="560" y="210" text-anchor="middle" dominant-baseline="central">Given-When-Then</text></g>

<line x1="560" y1="116" x2="560" y2="166" class="arr" marker-end="url(#arrow)"/>
<g class="c-coral"><polygon points="548,141 560,129 572,141 560,153" stroke-width="0.5"/></g>
<text class="ts" x="610" y="135" text-anchor="middle">Workshopping</text>
<text class="ts" x="610" y="150" text-anchor="middle">agent</text>

<g class="c-teal"><rect x="260" y="170" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="192" text-anchor="middle" dominant-baseline="central">ATDD gate</text>
<text class="ts" x="340" y="210" text-anchor="middle" dominant-baseline="central">Deterministic check</text></g>

<line x1="476" y1="198" x2="424" y2="198" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple"><rect x="40" y="170" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="120" y="192" text-anchor="middle" dominant-baseline="central">In progress</text>
<text class="ts" x="120" y="210" text-anchor="middle" dominant-baseline="central">TDD cycles</text></g>

<line x1="256" y1="198" x2="204" y2="198" class="arr" marker-end="url(#arrow)"/>
<g class="c-coral"><polygon points="228,184 240,196 228,208 216,196" stroke-width="0.5"/></g>
<text class="ts" x="228" y="170" text-anchor="middle">Coding agent</text>

<g class="c-teal"><rect x="40" y="280" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="120" y="302" text-anchor="middle" dominant-baseline="central">CI/CD gate</text>
<text class="ts" x="120" y="320" text-anchor="middle" dominant-baseline="central">Integration check</text></g>

<line x1="120" y1="226" x2="120" y2="276" class="arr" marker-end="url(#arrow)"/>

<g class="c-green"><rect x="260" y="280" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="302" text-anchor="middle" dominant-baseline="central">Working software</text>
<text class="ts" x="340" y="320" text-anchor="middle" dominant-baseline="central">Deployed, verified</text></g>

<line x1="200" y1="308" x2="256" y2="308" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue"><rect x="480" y="280" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="560" y="302" text-anchor="middle" dominant-baseline="central">User outcomes</text>
<text class="ts" x="560" y="320" text-anchor="middle" dominant-baseline="central">Value in the world</text></g>

<line x1="420" y1="308" x2="476" y2="308" class="arr" marker-end="url(#arrow)"/>

<g class="c-amber"><rect x="260" y="420" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="442" text-anchor="middle" dominant-baseline="central">Rework register</text>
<text class="ts" x="340" y="460" text-anchor="middle" dominant-baseline="central">Failures classified</text></g>

<line x1="340" y1="336" x2="340" y2="416" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="380">defects</text>

<g class="c-coral"><polygon points="588,448 600,436 612,448 600,460" stroke-width="0.5"/></g>
<text class="ts" x="600" y="484" text-anchor="middle">PDSA agent</text>
<text class="ts" x="600" y="498" text-anchor="middle">count ≥ 3</text>

<line x1="420" y1="448" x2="586" y2="448" class="arr" marker-end="url(#arrow)"/>

<path d="M 600 436 Q 600 250 600 130 L 644 130" fill="none" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="612" y="250">proposes rules</text>

<g class="c-blue"><rect x="40" y="540" width="180" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="564" text-anchor="middle" dominant-baseline="central">Ubiquitous glossary</text>
<text class="ts" x="130" y="582" text-anchor="middle" dominant-baseline="central">Versioned, enforced</text></g>

<g class="c-coral"><polygon points="218,558 230,546 242,558 230,570" stroke-width="0.5"/></g>
<text class="ts" x="250" y="555" text-anchor="start">Glossary agent</text>
<text class="ts" x="250" y="570" text-anchor="start">maintains terms</text>

<g class="c-blue"><rect x="40" y="620" width="180" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="644" text-anchor="middle" dominant-baseline="central">Process capability</text>
<text class="ts" x="130" y="662" text-anchor="middle" dominant-baseline="central">What we can promise</text></g>

<g class="c-blue"><rect x="40" y="700" width="180" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="724" text-anchor="middle" dominant-baseline="central">Lessons learned</text>
<text class="ts" x="130" y="742" text-anchor="middle" dominant-baseline="central">Pattern library</text></g>

<path d="M 130 600 L 130 620" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3"/>
<path d="M 130 680 L 130 700" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3"/>

<path d="M 220 570 Q 380 555 448 100" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<path d="M 220 640 Q 200 240 228 184" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="232" y="380">patterns inform coding</text>

<path d="M 340 476 Q 340 525 220 560" fill="none" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M 340 476 Q 340 595 220 640" fill="none" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M 340 476 Q 340 675 220 720" fill="none" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="280" y="620" width="360" height="160" rx="10" stroke-width="0.5"/>
<text class="th" x="460" y="644" text-anchor="middle" dominant-baseline="central">Human judgment zone</text>
<text class="ts" x="300" y="670">— Aim setting (what is the product for)</text>
<text class="ts" x="300" y="690">— Release slicing (what ships first)</text>
<text class="ts" x="300" y="710">— Customer acceptance (problem actually solved)</text>
<text class="ts" x="300" y="730">— Pattern interpretation (what failures mean)</text>
<text class="ts" x="300" y="750">— Code review (judgment about coding agent output)</text>
<text class="ts" x="300" y="770" font-style="italic">Agents prepare, propose, execute. Humans decide.</text></g>

<g><rect x="40" y="810" width="600" height="120" rx="8" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<text class="th" x="56" y="834">Five agents, two gates</text>
<text class="ts" x="56" y="858">Refinement, workshopping, glossary, coding, PDSA. Coding agent operates inside work-in-progress,</text>
<text class="ts" x="56" y="876">driven by acceptance-ready stories that already passed the ATDD gate. It writes code against tests,</text>
<text class="ts" x="56" y="894">runs them, iterates. Output passes through CI/CD gate before reaching working software. Lessons</text>
<text class="ts" x="56" y="912">learned feeds back into the coding agent so it improves with the system, not as a standalone tool.</text></g>
</svg>