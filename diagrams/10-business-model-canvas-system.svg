<svg width="100%" viewBox="0 0 680 920" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Business Model Canvas as a stock-and-flow system</title>
<desc>The nine canvas boxes arranged as stocks in a three-flow cycle: value creation, value delivery, value capture. Hidden stocks and feedback loops made explicit.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="ts" x="40" y="28">Three flows close the cycle: creation, delivery, capture. Dashed boxes are hidden stocks the canvas omits.</text>

<text class="th" x="120" y="60" text-anchor="middle">Value creation</text>
<text class="th" x="340" y="60" text-anchor="middle">Value delivery</text>
<text class="th" x="560" y="60" text-anchor="middle">Value capture</text>

<g class="c-purple"><rect x="40" y="80" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="120" y="102" text-anchor="middle" dominant-baseline="central">Key partnerships</text>
<text class="ts" x="120" y="120" text-anchor="middle" dominant-baseline="central">Suppliers, allies</text></g>

<g class="c-purple"><rect x="40" y="160" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="120" y="182" text-anchor="middle" dominant-baseline="central">Key resources</text>
<text class="ts" x="120" y="200" text-anchor="middle" dominant-baseline="central">Capital, talent, IP</text></g>

<g class="c-purple"><rect x="40" y="240" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="120" y="262" text-anchor="middle" dominant-baseline="central">Key activities</text>
<text class="ts" x="120" y="280" text-anchor="middle" dominant-baseline="central">Production work</text></g>

<line x1="120" y1="136" x2="120" y2="156" class="arr" marker-end="url(#arrow)"/>
<line x1="120" y1="216" x2="120" y2="236" class="arr" marker-end="url(#arrow)"/>

<line x1="200" y1="268" x2="256" y2="268" class="arr" marker-end="url(#arrow)"/>
<circle cx="228" cy="268" r="5" fill="var(--color-background-primary)" stroke="var(--t)" stroke-width="1"/>
<text class="ts" x="228" y="258" text-anchor="middle">produces</text>

<g class="c-teal"><rect x="260" y="240" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="262" text-anchor="middle" dominant-baseline="central">Value proposition</text>
<text class="ts" x="340" y="280" text-anchor="middle" dominant-baseline="central">What is offered</text></g>

<g class="c-teal"><rect x="260" y="160" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="182" text-anchor="middle" dominant-baseline="central">Customer relationships</text>
<text class="ts" x="340" y="200" text-anchor="middle" dominant-baseline="central">How we connect</text></g>

<g class="c-teal"><rect x="260" y="320" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="342" text-anchor="middle" dominant-baseline="central">Channels</text>
<text class="ts" x="340" y="360" text-anchor="middle" dominant-baseline="central">How it reaches them</text></g>

<line x1="340" y1="216" x2="340" y2="236" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="296" x2="340" y2="316" class="arr" marker-end="url(#arrow)"/>

<line x1="420" y1="268" x2="476" y2="268" class="arr" marker-end="url(#arrow)"/>
<circle cx="448" cy="268" r="5" fill="var(--color-background-primary)" stroke="var(--t)" stroke-width="1"/>
<text class="ts" x="448" y="258" text-anchor="middle">delivers to</text>

<g class="c-blue"><rect x="480" y="160" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="560" y="182" text-anchor="middle" dominant-baseline="central">Customer segments</text>
<text class="ts" x="560" y="200" text-anchor="middle" dominant-baseline="central">Who pays for it</text></g>

<g class="c-blue"><rect x="480" y="240" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="560" y="262" text-anchor="middle" dominant-baseline="central">Revenue streams</text>
<text class="ts" x="560" y="280" text-anchor="middle" dominant-baseline="central">Cash inflow</text></g>

<line x1="560" y1="216" x2="560" y2="236" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="595" y="230">generates</text>

<g class="c-amber"><rect x="260" y="420" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="442" text-anchor="middle" dominant-baseline="central">Cost structure</text>
<text class="ts" x="340" y="460" text-anchor="middle" dominant-baseline="central">Cash outflow</text></g>

<path d="M 560 296 Q 560 440 424 448" fill="none" stroke="var(--t)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="500" y="380" text-anchor="middle">funds</text>

<path d="M 256 448 Q 120 448 120 296" fill="none" stroke="var(--t)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="180" y="380" text-anchor="middle">sustains creation</text>

<g class="c-gray"><rect x="40" y="520" width="160" height="56" rx="8" stroke-dasharray="4 3" stroke-width="0.5"/>
<text class="th" x="120" y="542" text-anchor="middle" dominant-baseline="central">Operational knowledge</text>
<text class="ts" x="120" y="560" text-anchor="middle" dominant-baseline="central">Accumulated learning</text></g>

<g class="c-gray"><rect x="260" y="520" width="160" height="56" rx="8" stroke-dasharray="4 3" stroke-width="0.5"/>
<text class="th" x="340" y="542" text-anchor="middle" dominant-baseline="central">Brand and reputation</text>
<text class="ts" x="340" y="560" text-anchor="middle" dominant-baseline="central">Trust accumulated</text></g>

<g class="c-gray"><rect x="480" y="520" width="160" height="56" rx="8" stroke-dasharray="4 3" stroke-width="0.5"/>
<text class="th" x="560" y="542" text-anchor="middle" dominant-baseline="central">Customer goodwill</text>
<text class="ts" x="560" y="560" text-anchor="middle" dominant-baseline="central">Beyond customer count</text></g>

<g class="c-gray"><rect x="260" y="600" width="160" height="56" rx="8" stroke-dasharray="4 3" stroke-width="0.5"/>
<text class="th" x="340" y="622" text-anchor="middle" dominant-baseline="central">Cash reserves</text>
<text class="ts" x="340" y="640" text-anchor="middle" dominant-baseline="central">Resilience buffer</text></g>

<text class="ts" x="340" y="595" text-anchor="middle" font-style="italic">Hidden stocks the canvas omits</text>

<g><rect x="40" y="690" width="600" height="220" rx="8" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<text class="th" x="56" y="714">Three loops the canvas implies but does not draw</text>
<text class="ts" x="56" y="740">Growth loop (reinforcing): revenue → key activities → value proposition → customer segments →</text>
<text class="ts" x="56" y="758">more revenue. When closed and healthy, the business grows. When broken, growth stalls.</text>
<text class="ts" x="56" y="784">Efficiency loop (balancing): costs drain capital → constrains resources → limits activities →</text>
<text class="ts" x="56" y="802">sets cost structure. Pushes toward equilibrium. Pathological when consumption exceeds production.</text>
<text class="ts" x="56" y="828">Learning loop (reinforcing or broken): customer interactions reveal proposition fit → refines</text>
<text class="ts" x="56" y="846">activities. Most business failures are failures of this loop — operationally healthy, cognitively isolated.</text>
<text class="ts" x="56" y="880">The canvas is a snapshot. The system underneath is what predicts behavior. The boxes name the</text>
<text class="ts" x="56" y="898">parts; the flows and loops show the dynamics. Both are necessary; only the dynamics predict outcomes.</text></g>
</svg>