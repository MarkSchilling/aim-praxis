<svg width="100%" viewBox="0 0 680 1400" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Integrated seven-practice stock-and-flow system with agentic agents placed across all layers</title>
<desc>Seven practices stacked. Agents placed at valves, gates, and the rework register. Human judgment concentrated at aim setting, fit validation, release slicing, customer acceptance, and pattern interpretation.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="ts" x="40" y="28">Coral diamonds are agents. Agents widen valves; humans hold judgment.</text>

<text class="th" x="40" y="64">BMC layer — weeks to quarters</text>
<g class="c-purple"><rect x="40" y="80" width="170" height="56" rx="8" stroke-width="0.5"/>
