<g class="c-green"><rect x="440" y="740" width="170" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="525" y="762" text-anchor="middle" dominant-baseline="central">Working software</text>
<text class="ts" x="525" y="780" text-anchor="middle" dominant-baseline="central">In production</text></g>

<g class="c-coral"><polygon points="218,768 230,756 242,768 230,780" stroke-width="0.5"/></g>
