<g class="c-coral"><polygon points="628,768 640,756 652,768 640,780" stroke-width="0.5"/></g>
<text class="ts" x="640" y="806" text-anchor="middle">Observability</text>
<text class="ts" x="640" y="820" text-anchor="middle">agent</text>

<line x1="325" y1="796" x2="325" y2="816" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="200" y="820" width="250" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="325" y="842" text-anchor="middle" dominant-baseline="central">User outcomes</text>
<text class="ts" x="325" y="860" text-anchor="middle" dominant-baseline="central">Value in the world</text></g>

<path d="M 450 848 Q 670 848 670 108 L 654 108" fill="none" stroke="#993C1D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="674" y="478" text-anchor="end">value capture</text>

<path d="M 200 848 Q 20 848 20 218 L 36 218" fill="none" stroke="#993C1D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="12" y="478" text-anchor="start">learning</text>

<g class="c-amber"><rect x="200" y="900" width="250" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="325" y="922" text-anchor="middle" dominant-baseline="central">Rework register</text>
<text class="ts" x="325" y="940" text-anchor="middle" dominant-baseline="central">Failures classified by loop</text></g>

<line x1="325" y1="876" x2="325" y2="896" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral"><polygon points="468,928 480,916 492,928 480,940" stroke-width="0.5"/></g>
<text class="ts" x="500" y="924" text-anchor="start">PDSA agent</text>
<text class="ts" x="500" y="940" text-anchor="start">count ≥ 3</text>

<path d="M 200 928 Q 100 928 100 328 L 38 328" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M 200 928 Q 130 928 130 438 L 38 438" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M 200 928 Q 160 928 160 548 L 38 548" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<text class="th" x="325" y="990" text-anchor="middle">Compounding artifacts</text>

<g class="c-blue"><rect x="40" y="1010" width="170" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="125" y="1028" text-anchor="middle" dominant-baseline="central">Ubiquitous glossary</text>
<text class="ts" x="125" y="1046" text-anchor="middle" dominant-baseline="central">Shared language</text></g>
<g class="c-blue"><rect x="240" y="1010" width="170" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="325" y="1028" text-anchor="middle" dominant-baseline="central">Process capability</text>
<text class="ts" x="325" y="1046" text-anchor="middle" dominant-baseline="central">What we promise</text></g>
<g class="c-blue"><rect x="440" y="1010" width="170" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="525" y="1028" text-anchor="middle" dominant-baseline="central">Lessons learned</text>
<text class="ts" x="525" y="1046" text-anchor="middle" dominant-baseline="central">Pattern library</text></g>

<path d="M 325 956 L 325 1006" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3"/>

<g class="c-gray"><rect x="40" y="1090" width="610" height="160" rx="10" stroke-width="0.5"/>
<text class="th" x="345" y="1114" text-anchor="middle" dominant-baseline="central">Human judgment zone</text>
<text class="ts" x="60" y="1142">— BMC: aim setting, segment definition, revenue model decisions</text>
<text class="ts" x="60" y="1162">— VPC: fit validation, which pain to prioritize, hidden stock interpretation</text>
<text class="ts" x="60" y="1182">— Story Mapping: release slicing, scope depletion calls</text>
<text class="ts" x="60" y="1202">— ATDD: customer acceptance, story completion judgment</text>
<text class="ts" x="60" y="1222">— Rework register: pattern interpretation, PDSA proposal review</text>
<text class="ts" x="60" y="1242" font-style="italic">Agents prepare materials. Gates enforce criteria. Humans decide.</text></g>

<g><rect x="40" y="1270" width="610" height="120" rx="8" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<text class="th" x="56" y="1294">Eight agents distributed across seven layers</text>
<text class="ts" x="56" y="1318">Outer layers get sensing agents (market signal, customer research). Middle layers get drafting and</text>
<text class="ts" x="56" y="1336">refining agents (refinement, workshopping, glossary). Acceptance gets the ATDD Guardian. Code</text>
<text class="ts" x="56" y="1354">layer gets the coding agent. CI/CD gets the gate and observability. PDSA agent monitors the register.</text>
<text class="ts" x="56" y="1378">No agent operates without a gate or human review downstream. The system retains its judgment.</text></g>
</svg>