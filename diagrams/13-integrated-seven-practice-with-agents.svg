<circle cx="325" cy="146" r="5" fill="var(--color-background-primary)" stroke="var(--t)" stroke-width="1"/>

<text class="th" x="40" y="176">VPC layer — weeks to months</text>
<g class="c-teal"><rect x="40" y="190" width="170" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="125" y="212" text-anchor="middle" dominant-baseline="central">Customer jobs</text>
