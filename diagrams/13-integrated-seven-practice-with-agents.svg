<text class="ts" x="125" y="560" text-anchor="middle" dominant-baseline="central">Customer-agreed</text></g>
<g class="c-amber"><rect x="240" y="520" width="170" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="325" y="542" text-anchor="middle" dominant-baseline="central">Acceptance tests</text>
<text class="ts" x="325" y="560" text-anchor="middle" dominant-baseline="central">Executable gates</text></g>
<g class="c-amber"><rect x="440" y="520" width="170" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="525" y="542" text-anchor="middle" dominant-baseline="central">Complete</text>
<text class="ts" x="525" y="560" text-anchor="middle" dominant-baseline="central">Customer signoff</text></g>

<g class="c-coral"><polygon points="218,548 230,536 242,548 230,560" stroke-width="0.5"/></g>
<text class="ts" x="200" y="510" text-anchor="end">ATDD Guardian</text>

<line x1="325" y1="576" x2="325" y2="596" class="arr" marker-end="url(#arrow)"/>
<circle cx="325" cy="586" r="5" fill="var(--color-background-primary)" stroke="var(--t)" stroke-width="1"/>

<text class="th" x="40" y="616">TDD layer — minutes</text>
<g class="c-blue"><rect x="40" y="630" width="170" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="125" y="652" text-anchor="middle" dominant-baseline="central">Failing tests</text>
<text class="ts" x="125" y="670" text-anchor="middle" dominant-baseline="central">Red phase</text></g>
<g class="c-blue"><rect x="240" y="630" width="170" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="325" y="652" text-anchor="middle" dominant-baseline="central">Passing tests</text>
<text class="ts" x="325" y="670" text-anchor="middle" dominant-baseline="central">Green phase</text></g>
<g class="c-blue"><rect x="440" y="630" width="170" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="525" y="652" text-anchor="middle" dominant-baseline="central">Refactored code</text>
<text class="ts" x="525" y="670" text-anchor="middle" dominant-baseline="central">Clean design</text></g>

<g class="c-coral"><polygon points="218,658 230,646 242,658 230,670" stroke-width="0.5"/></g>
