<text class="ts" x="125" y="120" text-anchor="middle" dominant-baseline="central">Who, what, why</text></g>
<g class="c-purple"><rect x="240" y="80" width="170" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="325" y="102" text-anchor="middle" dominant-baseline="central">Value flows</text>
<text class="ts" x="325" y="120" text-anchor="middle" dominant-baseline="central">Create, deliver, capture</text></g>
<g class="c-purple"><rect x="440" y="80" width="170" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="525" y="102" text-anchor="middle" dominant-baseline="central">Revenue and cost</text>
<text class="ts" x="525" y="120" text-anchor="middle" dominant-baseline="central">Sustainability</text></g>

<g class="c-coral"><polygon points="628,108 640,96 652,108 640,120" stroke-width="0.5"/></g>
<text class="ts" x="640" y="138" text-anchor="middle">Market</text>
<text class="ts" x="640" y="152" text-anchor="middle">signal agent</text>

