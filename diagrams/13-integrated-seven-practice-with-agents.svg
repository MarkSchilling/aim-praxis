<text class="ts" x="525" y="230" text-anchor="middle" dominant-baseline="central">Does it solve</text></g>

<g class="c-coral"><polygon points="628,218 640,206 652,218 640,230" stroke-width="0.5"/></g>
<text class="ts" x="640" y="248" text-anchor="middle">Customer</text>
