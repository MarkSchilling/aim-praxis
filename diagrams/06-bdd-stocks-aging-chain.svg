<svg width="100%" viewBox="0 0 680 760" role="img" xmlns="http://www.w3.org/2000/svg">
<title>The primary stocks of BDD as an aging chain</title>
<desc>Examples flow through scenarios into executable step definitions, producing living documentation and verification state. Defects feed back upstream into language refinement.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="ts" x="40" y="28">Eight stocks. Information flows from conversation through code to verified behavior.</text>

<g class="c-gray"><rect x="40" y="60" width="170" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="125" y="84" text-anchor="middle" dominant-baseline="central">Examples</text>
<text class="ts" x="125" y="104" text-anchor="middle" dominant-baseline="central">Concrete instances</text></g>

<g class="c-purple"><rect x="255" y="60" width="170" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="84" text-anchor="middle" dominant-baseline="central">Scenarios</text>
<text class="ts" x="340" y="104" text-anchor="middle" dominant-baseline="central">Given-When-Then</text></g>

<g class="c-purple"><rect x="470" y="60" width="170" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="555" y="84" text-anchor="middle" dominant-baseline="central">Features</text>
<text class="ts" x="555" y="104" text-anchor="middle" dominant-baseline="central">Grouped scenarios</text></g>

<line x1="210" y1="92" x2="251" y2="92" class="arr" marker-end="url(#arrow)"/>
<circle cx="230" cy="92" r="5" fill="var(--color-background-primary)" stroke="var(--t)" stroke-width="1"/>
<text class="ts" x="230" y="56" text-anchor="middle">formalize</text>

<line x1="425" y1="92" x2="466" y2="92" class="arr" marker-end="url(#arrow)"/>
<circle cx="445" cy="92" r="5" fill="var(--color-background-primary)" stroke="var(--t)" stroke-width="1"/>
<text class="ts" x="445" y="56" text-anchor="middle">organize</text>

<g class="c-blue"><rect x="40" y="200" width="170" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="125" y="224" text-anchor="middle" dominant-baseline="central">Ubiquitous language</text>
<text class="ts" x="125" y="244" text-anchor="middle" dominant-baseline="central">Shared vocabulary</text></g>

<path d="M 125 200 Q 125 160 200 130" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="135" y="170">constrains examples</text>

<path d="M 210 232 Q 290 232 320 130" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="240" y="190">disciplines scenarios</text>

<g class="c-teal"><rect x="255" y="200" width="170" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="224" text-anchor="middle" dominant-baseline="central">Step definitions</text>
<text class="ts" x="340" y="244" text-anchor="middle" dominant-baseline="central">Executable bindings</text></g>

<line x1="340" y1="124" x2="340" y2="196" class="arr" marker-end="url(#arrow)"/>
<circle cx="340" cy="160" r="5" fill="var(--color-background-primary)" stroke="var(--t)" stroke-width="1"/>
<text class="ts" x="352" y="164">implement</text>

<g class="c-teal"><rect x="470" y="200" width="170" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="555" y="224" text-anchor="middle" dominant-baseline="central">Test results</text>
<text class="ts" x="555" y="244" text-anchor="middle" dominant-baseline="central">Pass / fail state</text></g>

<line x1="425" y1="232" x2="466" y2="232" class="arr" marker-end="url(#arrow)"/>
<circle cx="445" cy="232" r="5" fill="var(--color-background-primary)" stroke="var(--t)" stroke-width="1"/>
<text class="ts" x="445" y="196" text-anchor="middle">execute</text>

<g class="c-green"><rect x="255" y="340" width="170" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="364" text-anchor="middle" dominant-baseline="central">Living documentation</text>
<text class="ts" x="340" y="384" text-anchor="middle" dominant-baseline="central">Verified behavior</text></g>

<line x1="510" y1="264" x2="380" y2="336" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="430" y="305">passing tests</text>
<text class="ts" x="430" y="320">render docs</text>

<g class="c-amber"><rect x="470" y="340" width="170" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="555" y="364" text-anchor="middle" dominant-baseline="central">Defects and drift</text>
<text class="ts" x="555" y="384" text-anchor="middle" dominant-baseline="central">Failed scenarios, gaps</text></g>

<line x1="555" y1="264" x2="555" y2="336" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="567" y="305">failures</text>
<text class="ts" x="567" y="320">accumulate</text>

<path d="M 555 340 Q 555 290 555 260" fill="none" stroke="var(--t)" stroke-width="0.5" opacity="0"/>

<path d="M 470 372 Q 60 372 60 250 L 90 230" fill="none" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="100" y="372">feeds back into language refinement</text>

<g class="c-gray"><rect x="40" y="460" width="600" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="482" text-anchor="middle" dominant-baseline="central">System behavior (the actual product)</text>
<text class="ts" x="340" y="504" text-anchor="middle" dominant-baseline="central">What users encounter — the stock BDD attempts to specify and constrain</text></g>

<line x1="340" y1="404" x2="340" y2="456" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="430">specifies</text>

<path d="M 500 520 Q 620 520 620 372" fill="none" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="510" y="540">drift detected here</text>

<g><rect x="40" y="570" width="600" height="170" rx="8" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<text class="th" x="56" y="594">Reading the chain</text>
<text class="ts" x="56" y="618">Examples are the inflow — the human conversation that originates everything. They are formalized</text>
<text class="ts" x="56" y="636">into scenarios, which are organized into features and bound to executable step definitions. Running</text>
<text class="ts" x="56" y="654">the suite produces test results, which feed two destination stocks: living documentation (success) and</text>
<text class="ts" x="56" y="672">defects and drift (failure). Ubiquitous language is the slow-moving stock that constrains all writing.</text>
<text class="ts" x="56" y="696">The key structural difference from Story Mapping: BDD's central stocks (scenarios, step definitions,</text>
<text class="ts" x="56" y="714">living documentation) are textual and version-controlled. They do not degrade when conversations</text>
<text class="ts" x="56" y="732">end, because they exist in code. That is BDD's signature property — durable specification.</text></g>
</svg>