<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Detail refinement as the valve between two stocks</title>
<desc>Unrefined backbone tasks flow through detail refinement to become refined tasks with sub-tasks, exceptions, and details.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="ts" x="40" y="32">Detail refinement is the valve between two states of the same information.</text>

<g class="c-gray"><rect x="40" y="80" width="180" height="80" rx="10" stroke-width="0.5"/>
<text class="th" x="130" y="106" text-anchor="middle" dominant-baseline="central">Unrefined backbone</text>
<text class="ts" x="130" y="128" text-anchor="middle" dominant-baseline="central">High-level tasks,</text>
<text class="ts" x="130" y="144" text-anchor="middle" dominant-baseline="central">no decomposition yet</text></g>

<line x1="220" y1="120" x2="460" y2="120" class="arr" marker-end="url(#arrow)"/>
<circle cx="340" cy="120" r="9" fill="var(--color-background-primary)" stroke="var(--t)" stroke-width="1.5"/>
<text class="th" x="340" y="92" text-anchor="middle">Detail refinement</text>
<text class="ts" x="340" y="150" text-anchor="middle">rate (verb)</text>

<g class="c-purple"><rect x="460" y="80" width="180" height="80" rx="10" stroke-width="0.5"/>
<text class="th" x="550" y="106" text-anchor="middle" dominant-baseline="central">Refined tasks</text>
<text class="ts" x="550" y="128" text-anchor="middle" dominant-baseline="central">Sub-tasks, exceptions,</text>
<text class="ts" x="550" y="144" text-anchor="middle" dominant-baseline="central">details added</text></g>

<g><rect x="40" y="210" width="600" height="130" rx="8" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<text class="th" x="56" y="234">What this fixes in the bathtub model</text>
<text class="ts" x="56" y="258">In the NotebookLM list, detail refinement appeared as an inflow filling a single undifferentiated story</text>
<text class="ts" x="56" y="276">map stock. But refinement does not add new information from outside the system — it transforms</text>
<text class="ts" x="56" y="294">information already in the stock to a higher resolution state. That is the signature of an aging chain.</text>
<text class="ts" x="56" y="320">True external inflows: user discovery, blue-sky ideation, stakeholder input. Internal flows: task</text>
<text class="ts" x="56" y="338">identification, detail refinement. The distinction matters when diagnosing where the system is stuck.</text></g>
</svg>