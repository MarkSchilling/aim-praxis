<svg width="100%" viewBox="0 0 680 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Value Proposition Canvas as a stock-and-flow system</title>
<desc>Customer jobs drive pain and gain stocks; supplier products install valves that drain pains and fill gains. Hidden stocks and feedback loops made explicit.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="ts" x="40" y="28">Supplier valves on the left act on customer stocks on the right. Dashed boxes are hidden stocks.</text>

<text class="th" x="170" y="60" text-anchor="middle">Supplier side (valves)</text>
<text class="th" x="510" y="60" text-anchor="middle">Customer side (stocks and flows)</text>

<g class="c-teal"><rect x="60" y="100" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="170" y="122" text-anchor="middle" dominant-baseline="central">Products and services</text>
<text class="ts" x="170" y="140" text-anchor="middle" dominant-baseline="central">The carriers of the valves</text></g>

<g class="c-teal"><rect x="60" y="180" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="170" y="202" text-anchor="middle" dominant-baseline="central">Pain relievers</text>
<text class="ts" x="170" y="220" text-anchor="middle" dominant-baseline="central">Drain pain stocks faster</text></g>

<g class="c-teal"><rect x="60" y="260" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="170" y="282" text-anchor="middle" dominant-baseline="central">Gain creators</text>
<text class="ts" x="170" y="300" text-anchor="middle" dominant-baseline="central">Fill gain stocks faster</text></g>

<g class="c-purple"><rect x="400" y="100" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="122" text-anchor="middle" dominant-baseline="central">Jobs to be done</text>
<text class="ts" x="510" y="140" text-anchor="middle" dominant-baseline="central">Continuous demands</text></g>

<g class="c-coral"><rect x="400" y="180" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="202" text-anchor="middle" dominant-baseline="central">Pains</text>
<text class="ts" x="510" y="220" text-anchor="middle" dominant-baseline="central">Stock filled by failed jobs</text></g>

<g class="c-green"><rect x="400" y="260" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="282" text-anchor="middle" dominant-baseline="central">Gains</text>
<text class="ts" x="510" y="300" text-anchor="middle" dominant-baseline="central">Stock filled by good outcomes</text></g>

<line x1="510" y1="156" x2="510" y2="176" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="540" y="172">failed jobs fill</text>

<line x1="510" y1="156" x2="510" y2="256" class="arr" marker-end="url(#arrow)" opacity="0.5"/>
<text class="ts" x="540" y="252">good outcomes fill</text>

<line x1="280" y1="208" x2="400" y2="208" class="arr" marker-end="url(#arrow)"/>
<circle cx="340" cy="208" r="6" fill="var(--color-background-primary)" stroke="var(--t)" stroke-width="1"/>
<text class="ts" x="340" y="198" text-anchor="middle">drains</text>

<line x1="280" y1="288" x2="400" y2="288" class="arr" marker-end="url(#arrow)"/>
<circle cx="340" cy="288" r="6" fill="var(--color-background-primary)" stroke="var(--t)" stroke-width="1"/>
<text class="ts" x="340" y="278" text-anchor="middle">fills</text>

<line x1="280" y1="128" x2="400" y2="128" class="arr" marker-end="url(#arrow)" opacity="0.5"/>
<text class="ts" x="340" y="118" text-anchor="middle">addresses</text>

<text class="th" x="340" y="370" text-anchor="middle">Hidden customer stocks the canvas omits</text>

<g class="c-gray"><rect x="40" y="390" width="140" height="56" rx="8" stroke-dasharray="4 3" stroke-width="0.5"/>
<text class="th" x="110" y="412" text-anchor="middle" dominant-baseline="central">Switching cost</text>
<text class="ts" x="110" y="430" text-anchor="middle" dominant-baseline="central">Resistance to change</text></g>

<g class="c-gray"><rect x="190" y="390" width="140" height="56" rx="8" stroke-dasharray="4 3" stroke-width="0.5"/>
<text class="th" x="260" y="412" text-anchor="middle" dominant-baseline="central">Trust</text>
<text class="ts" x="260" y="430" text-anchor="middle" dominant-baseline="central">Confidence in category</text></g>

<g class="c-gray"><rect x="340" y="390" width="140" height="56" rx="8" stroke-dasharray="4 3" stroke-width="0.5"/>
<text class="th" x="410" y="412" text-anchor="middle" dominant-baseline="central">Awareness</text>
<text class="ts" x="410" y="430" text-anchor="middle" dominant-baseline="central">Is the pain felt</text></g>

<g class="c-gray"><rect x="490" y="390" width="140" height="56" rx="8" stroke-dasharray="4 3" stroke-width="0.5"/>
<text class="th" x="560" y="412" text-anchor="middle" dominant-baseline="central">Urgency</text>
<text class="ts" x="560" y="430" text-anchor="middle" dominant-baseline="central">Rate of pain rise</text></g>

<text class="th" x="340" y="490" text-anchor="middle">Three loops the canvas does not draw</text>

<g class="c-blue"><rect x="40" y="510" width="180" height="80" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="534" text-anchor="middle" dominant-baseline="central">Relief loop</text>
<text class="ts" x="130" y="555" text-anchor="middle" dominant-baseline="central">Pain drained →</text>
<text class="ts" x="130" y="572" text-anchor="middle" dominant-baseline="central">deeper integration →</text>
<text class="ts" x="130" y="585" text-anchor="middle" dominant-baseline="central">retention (reinforcing)</text></g>

<g class="c-amber"><rect x="250" y="510" width="180" height="80" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="534" text-anchor="middle" dominant-baseline="central">Expectation loop</text>
<text class="ts" x="340" y="555" text-anchor="middle" dominant-baseline="central">Gains habituate →</text>
<text class="ts" x="340" y="572" text-anchor="middle" dominant-baseline="central">baseline resets →</text>
<text class="ts" x="340" y="585" text-anchor="middle" dominant-baseline="central">value decays (balancing)</text></g>

<g class="c-coral"><rect x="460" y="510" width="180" height="80" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="534" text-anchor="middle" dominant-baseline="central">Disappointment loop</text>
<text class="ts" x="550" y="555" text-anchor="middle" dominant-baseline="central">Promise fails →</text>
<text class="ts" x="550" y="572" text-anchor="middle" dominant-baseline="central">new pain emerges →</text>
<text class="ts" x="550" y="585" text-anchor="middle" dominant-baseline="central">detractor (reinforcing)</text></g>

<g><rect x="40" y="620" width="600" height="280" rx="8" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<text class="th" x="56" y="644">Reading the diagram</text>
<text class="ts" x="56" y="668">Jobs are continuous demands. They flow into either the pain stock (when jobs go badly) or the gain</text>
<text class="ts" x="56" y="686">stock (when they go well). Pain relievers and gain creators are valves the supplier installs in the</text>
<text class="ts" x="56" y="704">customer's system — they drain pains and fill gains faster than the customer could alone.</text>
<text class="ts" x="56" y="730">Fit is not item matching. Fit is whether supplier valves are installed where customer stocks are</text>
<text class="ts" x="56" y="748">most painfully accumulating or most below desired levels. The match is between rates, not lists.</text>
<text class="ts" x="56" y="774">The hidden stocks modulate everything. A perfect fit fails when switching cost is high, trust is</text>
<text class="ts" x="56" y="792">low, awareness is low, or urgency is low. The standard canvas does not surface these constraints.</text>
<text class="ts" x="56" y="818">The three loops determine long-term outcomes. Relief loop produces retention. Expectation loop</text>
<text class="ts" x="56" y="836">requires continuous gain creation to stay ahead of habituation. Disappointment loop converts</text>
<text class="ts" x="56" y="854">customers into detractors when promises fail — the most dangerous loop because it overrides relief.</text>
<text class="ts" x="56" y="880">Diagnostic question: which customer pain is currently rising, not just high? Rising pain produces</text>
<text class="ts" x="56" y="898">urgency. High but stable pain produces tolerance. Your value proposition emphasis aligns with rising.</text></g>
</svg>