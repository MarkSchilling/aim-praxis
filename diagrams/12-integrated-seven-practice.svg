<svg width="100%" viewBox="0 0 680 1280" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Integrated stock-and-flow system for BMC, VPC, Story Mapping, BDD, ATDD, TDD, and CI/CD</title>
<desc>Seven practices stacked as nested aging chains. Business model assumptions flow down through value proposition, story map, behavior, acceptance, code, and deployment. Value and learning flow back up.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="ts" x="40" y="28">Seven practices, one system. Downward arrows specify; upward arrows learn.</text>

<text class="th" x="40" y="64">BMC layer — business model, weeks to quarters</text>
<g class="c-purple"><rect x="40" y="80" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="102" text-anchor="middle" dominant-baseline="central">Aim and segments</text>
<text class="ts" x="130" y="120" text-anchor="middle" dominant-baseline="central">Who, what, why</text></g>
<g class="c-purple"><rect x="250" y="80" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="102" text-anchor="middle" dominant-baseline="central">Value flows</text>
<text class="ts" x="340" y="120" text-anchor="middle" dominant-baseline="central">Create, deliver, capture</text></g>
<g class="c-purple"><rect x="460" y="80" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="102" text-anchor="middle" dominant-baseline="central">Revenue and cost</text>
<text class="ts" x="550" y="120" text-anchor="middle" dominant-baseline="central">Sustainability</text></g>

<line x1="340" y1="136" x2="340" y2="156" class="arr" marker-end="url(#arrow)"/>
<circle cx="340" cy="146" r="5" fill="var(--color-background-primary)" stroke="var(--t)" stroke-width="1"/>

<text class="th" x="40" y="176">VPC layer — supplier-customer interface, weeks to months</text>
<g class="c-teal"><rect x="40" y="190" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="212" text-anchor="middle" dominant-baseline="central">Customer jobs</text>
<text class="ts" x="130" y="230" text-anchor="middle" dominant-baseline="central">Pains and gains</text></g>
<g class="c-teal"><rect x="250" y="190" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="212" text-anchor="middle" dominant-baseline="central">Value proposition</text>
<text class="ts" x="340" y="230" text-anchor="middle" dominant-baseline="central">Relievers and creators</text></g>
<g class="c-teal"><rect x="460" y="190" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="212" text-anchor="middle" dominant-baseline="central">Fit validation</text>
<text class="ts" x="550" y="230" text-anchor="middle" dominant-baseline="central">Does it actually solve</text></g>

<line x1="340" y1="246" x2="340" y2="266" class="arr" marker-end="url(#arrow)"/>
<circle cx="340" cy="256" r="5" fill="var(--color-background-primary)" stroke="var(--t)" stroke-width="1"/>

<text class="th" x="40" y="286">Story Mapping layer — narrative structure, weeks</text>
<g class="c-coral"><rect x="40" y="300" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="322" text-anchor="middle" dominant-baseline="central">Backbone</text>
<text class="ts" x="130" y="340" text-anchor="middle" dominant-baseline="central">Activities and tasks</text></g>
<g class="c-coral"><rect x="250" y="300" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="322" text-anchor="middle" dominant-baseline="central">Refined tasks</text>
<text class="ts" x="340" y="340" text-anchor="middle" dominant-baseline="central">Details and exceptions</text></g>
<g class="c-coral"><rect x="460" y="300" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="322" text-anchor="middle" dominant-baseline="central">Release slices</text>
<text class="ts" x="550" y="340" text-anchor="middle" dominant-baseline="central">MVP, walking skeleton</text></g>

<line x1="340" y1="356" x2="340" y2="376" class="arr" marker-end="url(#arrow)"/>
<circle cx="340" cy="366" r="5" fill="var(--color-background-primary)" stroke="var(--t)" stroke-width="1"/>

<text class="th" x="40" y="396">BDD layer — behavioral specification, days to weeks</text>
<g class="c-pink"><rect x="40" y="410" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="432" text-anchor="middle" dominant-baseline="central">Examples</text>
<text class="ts" x="130" y="450" text-anchor="middle" dominant-baseline="central">Conversation captures</text></g>
<g class="c-pink"><rect x="250" y="410" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="432" text-anchor="middle" dominant-baseline="central">Scenarios</text>
<text class="ts" x="340" y="450" text-anchor="middle" dominant-baseline="central">Given-When-Then</text></g>
<g class="c-pink"><rect x="460" y="410" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="432" text-anchor="middle" dominant-baseline="central">Living documentation</text>
<text class="ts" x="550" y="450" text-anchor="middle" dominant-baseline="central">Verified behavior</text></g>

<line x1="340" y1="466" x2="340" y2="486" class="arr" marker-end="url(#arrow)"/>
<circle cx="340" cy="476" r="5" fill="var(--color-background-primary)" stroke="var(--t)" stroke-width="1"/>

<text class="th" x="40" y="506">ATDD layer — story acceptance, days</text>
<g class="c-amber"><rect x="40" y="520" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="542" text-anchor="middle" dominant-baseline="central">Acceptance criteria</text>
<text class="ts" x="130" y="560" text-anchor="middle" dominant-baseline="central">Customer-agreed</text></g>
<g class="c-amber"><rect x="250" y="520" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="542" text-anchor="middle" dominant-baseline="central">Acceptance tests</text>
<text class="ts" x="340" y="560" text-anchor="middle" dominant-baseline="central">Executable gates</text></g>
<g class="c-amber"><rect x="460" y="520" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="542" text-anchor="middle" dominant-baseline="central">Demonstrably complete</text>
<text class="ts" x="550" y="560" text-anchor="middle" dominant-baseline="central">Customer signoff</text></g>

<line x1="340" y1="576" x2="340" y2="596" class="arr" marker-end="url(#arrow)"/>
<circle cx="340" cy="586" r="5" fill="var(--color-background-primary)" stroke="var(--t)" stroke-width="1"/>

<text class="th" x="40" y="616">TDD layer — unit design, minutes</text>
<g class="c-blue"><rect x="40" y="630" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="652" text-anchor="middle" dominant-baseline="central">Failing unit tests</text>
<text class="ts" x="130" y="670" text-anchor="middle" dominant-baseline="central">Red phase</text></g>
<g class="c-blue"><rect x="250" y="630" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="652" text-anchor="middle" dominant-baseline="central">Passing unit tests</text>
<text class="ts" x="340" y="670" text-anchor="middle" dominant-baseline="central">Green phase</text></g>
<g class="c-blue"><rect x="460" y="630" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="652" text-anchor="middle" dominant-baseline="central">Refactored code</text>
<text class="ts" x="550" y="670" text-anchor="middle" dominant-baseline="central">Clean design</text></g>

<line x1="340" y1="686" x2="340" y2="706" class="arr" marker-end="url(#arrow)"/>
<circle cx="340" cy="696" r="5" fill="var(--color-background-primary)" stroke="var(--t)" stroke-width="1"/>

<text class="th" x="40" y="726">CI/CD layer — integration and deployment, seconds to hours</text>
<g class="c-green"><rect x="40" y="740" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="762" text-anchor="middle" dominant-baseline="central">Integrated build</text>
<text class="ts" x="130" y="780" text-anchor="middle" dominant-baseline="central">All tests green</text></g>
<g class="c-green"><rect x="250" y="740" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="762" text-anchor="middle" dominant-baseline="central">Deployed artifact</text>
<text class="ts" x="340" y="780" text-anchor="middle" dominant-baseline="central">Production-ready</text></g>
<g class="c-green"><rect x="460" y="740" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="762" text-anchor="middle" dominant-baseline="central">Working software</text>
<text class="ts" x="550" y="780" text-anchor="middle" dominant-baseline="central">In production</text></g>

<line x1="340" y1="796" x2="340" y2="816" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="200" y="820" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="842" text-anchor="middle" dominant-baseline="central">User outcomes</text>
<text class="ts" x="340" y="860" text-anchor="middle" dominant-baseline="central">Value realized in the world</text></g>

<path d="M 480 848 Q 660 848 660 108 L 644 108" fill="none" stroke="#993C1D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="668" y="478" text-anchor="end">value capture</text>
<text class="ts" x="668" y="494" text-anchor="end">closes the BMC loop</text>

<path d="M 200 848 Q 20 848 20 218 L 36 218" fill="none" stroke="#993C1D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="12" y="478" text-anchor="start">learning</text>
<text class="ts" x="12" y="494" text-anchor="start">closes VPC fit</text>

<g class="c-coral"><rect x="200" y="900" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="922" text-anchor="middle" dominant-baseline="central">Rework register</text>
<text class="ts" x="340" y="940" text-anchor="middle" dominant-baseline="central">Failures classified by loop</text></g>

<line x1="340" y1="876" x2="340" y2="896" class="arr" marker-end="url(#arrow)"/>

<path d="M 200 928 Q 100 928 100 328 L 220 328" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M 200 928 Q 130 928 130 438 L 220 438" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M 200 928 Q 160 928 160 548 L 220 548" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<text class="th" x="340" y="990" text-anchor="middle">Compounding artifacts — slow stocks that improve all loops</text>

<g class="c-blue"><rect x="40" y="1010" width="180" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="1028" text-anchor="middle" dominant-baseline="central">Ubiquitous glossary</text>
<text class="ts" x="130" y="1046" text-anchor="middle" dominant-baseline="central">Shared language</text></g>
<g class="c-blue"><rect x="250" y="1010" width="180" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="1028" text-anchor="middle" dominant-baseline="central">Process capability</text>
<text class="ts" x="340" y="1046" text-anchor="middle" dominant-baseline="central">What we promise</text></g>
<g class="c-blue"><rect x="460" y="1010" width="180" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="1028" text-anchor="middle" dominant-baseline="central">Lessons learned</text>
<text class="ts" x="550" y="1046" text-anchor="middle" dominant-baseline="central">Pattern library</text></g>

<path d="M 340 956 Q 340 990 340 1006" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3"/>

<g><rect x="40" y="1080" width="600" height="180" rx="8" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<text class="th" x="56" y="1104">Reading the integrated system</text>
<text class="ts" x="56" y="1128">Downward valves specify: BMC sets aim, VPC defines fit, Story Mapping organizes narrative, BDD</text>
<text class="ts" x="56" y="1146">captures behavior, ATDD agrees acceptance, TDD designs units, CI/CD integrates and deploys.</text>
<text class="ts" x="56" y="1172">Two upward feedback paths close the system. Value capture (right) returns revenue to fund the BMC.</text>
<text class="ts" x="56" y="1190">Learning (left) returns information about whether fit assumptions held in the VPC.</text>
<text class="ts" x="56" y="1216">Rework register classifies failures by which loop caught them, feeding compounding artifacts that</text>
<text class="ts" x="56" y="1234">improve every layer over time. The system is a learning system because all three feedback paths close.</text></g>
</svg>