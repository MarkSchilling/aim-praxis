<svg width="100%" viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Ship Audit stock and flow diagram</title>
<desc>A systems thinking view of the Story Map: user intent flows through backbone tasks into detail specifications, which become acceptance criteria, then validated system capability. Feedback loops via the Rework Register and PDSA Improvement Agent.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="ts" x="40" y="32">Stocks (rectangles) accumulate. Flows (valved arrows) change them. Dashed lines are information feedback.</text>

<g class="c-gray"><rect x="40" y="60" width="140" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="110" y="84" text-anchor="middle" dominant-baseline="central">User intent</text>
<text class="ts" x="110" y="102" text-anchor="middle" dominant-baseline="central">Backbone tasks</text></g>

<g class="c-purple"><rect x="230" y="60" width="160" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="310" y="84" text-anchor="middle" dominant-baseline="central">Detail backlog</text>
<text class="ts" x="310" y="102" text-anchor="middle" dominant-baseline="central">Asks of the system</text></g>

<g class="c-teal"><rect x="440" y="60" width="160" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="520" y="84" text-anchor="middle" dominant-baseline="central">Acceptance criteria</text>
<text class="ts" x="520" y="102" text-anchor="middle" dominant-baseline="central">Executable contract</text></g>

<line x1="180" y1="90" x2="226" y2="90" class="arr" marker-end="url(#arrow)"/>
<circle cx="203" cy="90" r="5" fill="none" stroke="var(--t)" stroke-width="1"/>
<text class="ts" x="203" y="58" text-anchor="middle">decompose</text>

<line x1="390" y1="90" x2="436" y2="90" class="arr" marker-end="url(#arrow)"/>
<circle cx="413" cy="90" r="5" fill="none" stroke="var(--t)" stroke-width="1"/>
<text class="ts" x="413" y="58" text-anchor="middle">specify</text>

<g class="c-teal"><rect x="440" y="200" width="160" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="520" y="224" text-anchor="middle" dominant-baseline="central">Validated capability</text>
<text class="ts" x="520" y="242" text-anchor="middle" dominant-baseline="central">Gates passed</text></g>

<line x1="520" y1="120" x2="520" y2="196" class="arr" marker-end="url(#arrow)"/>
<circle cx="520" cy="158" r="5" fill="none" stroke="var(--t)" stroke-width="1"/>
<text class="ts" x="532" y="162">implement and verify</text>

<g class="c-amber"><rect x="230" y="200" width="160" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="310" y="224" text-anchor="middle" dominant-baseline="central">Rework register</text>
<text class="ts" x="310" y="242" text-anchor="middle" dominant-baseline="central">Defects, drift, gaps</text></g>

<line x1="440" y1="230" x2="394" y2="230" class="arr" marker-end="url(#arrow)"/>
<circle cx="417" cy="230" r="5" fill="none" stroke="var(--t)" stroke-width="1"/>
<text class="ts" x="417" y="200" text-anchor="middle">failures</text>

<g class="c-coral"><rect x="40" y="200" width="140" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="110" y="224" text-anchor="middle" dominant-baseline="central">PDSA agent</text>
<text class="ts" x="110" y="242" text-anchor="middle" dominant-baseline="central">Triggers at count ≥ 3</text></g>

<line x1="230" y1="230" x2="184" y2="230" class="arr" marker-end="url(#arrow)"/>
<circle cx="207" cy="230" r="5" fill="none" stroke="var(--t)" stroke-width="1"/>
<text class="ts" x="207" y="200" text-anchor="middle">recurrence</text>

<path d="M 110 200 Q 110 150 200 130 L 226 122" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="120" y="160">new detail rules</text>

<g class="c-blue"><rect x="40" y="340" width="180" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="364" text-anchor="middle" dominant-baseline="central">Ubiquitous glossary</text>
<text class="ts" x="130" y="382" text-anchor="middle" dominant-baseline="central">Shared language</text></g>

<g class="c-blue"><rect x="250" y="340" width="180" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="364" text-anchor="middle" dominant-baseline="central">Process capability</text>
<text class="ts" x="340" y="382" text-anchor="middle" dominant-baseline="central">What we can promise</text></g>

<g class="c-blue"><rect x="460" y="340" width="180" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="364" text-anchor="middle" dominant-baseline="central">Lessons learned</text>
<text class="ts" x="550" y="382" text-anchor="middle" dominant-baseline="central">Pattern library</text></g>

<line x1="310" y1="260" x2="200" y2="336" class="arr" marker-end="url(#arrow)" opacity="0.5"/>
<line x1="310" y1="260" x2="335" y2="336" class="arr" marker-end="url(#arrow)" opacity="0.5"/>
<line x1="310" y1="260" x2="470" y2="336" class="arr" marker-end="url(#arrow)" opacity="0.5"/>
<text class="ts" x="380" y="295">accumulate into</text>

<path d="M 130 400 Q 130 460 250 470 L 308 470" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M 340 400 Q 340 440 340 462" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M 550 400 Q 550 450 400 470 L 372 470" fill="none" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="240" y="470" width="200" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="488" text-anchor="middle" dominant-baseline="central">Detail quality</text>
<text class="ts" x="340" y="506" text-anchor="middle" dominant-baseline="central">Constrains future specs</text></g>

<path d="M 340 470 Q 340 380 340 200 Q 340 160 320 122" fill="none" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="440">B1 balancing</text>

<path d="M 110 260 Q 60 290 60 400 Q 60 540 230 580" fill="none" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="230" y="570" width="220" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="588" text-anchor="middle" dominant-baseline="central">System aim alignment</text>
<text class="ts" x="340" y="606" text-anchor="middle" dominant-baseline="central">True shipping cost visibility</text></g>

<path d="M 450 595 Q 620 595 620 230 L 600 230" fill="none" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="540" y="585">R1 reinforcing</text>

<g><rect x="40" y="650" width="600" height="55" rx="8" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<text class="ts" x="56" y="670">Solid arrows with valves = material flow.  Dashed arrows = information feedback.</text>
<text class="ts" x="56" y="688">R1 (reinforcing): capability builds aim alignment, which justifies more investment.  B1 (balancing): rework cuts</text>
<text class="ts" x="56" y="700">detail backlog growth — the system regulates itself through Deming's reduction of common-cause variation.</text></g>
</svg>